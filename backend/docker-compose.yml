version: '3.9'

services:
  chromadb:
    image: chromadb/chroma:0.4.24
    container_name: securedocs-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chromadb-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ALLOW_RESET=TRUE
    restart: unless-stopped

volumes:
  chromadb-data:
